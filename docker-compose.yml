services:
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?goauth_app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
      - POSTGRES_DB=${POSTGRES_DB:?goauth}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goauth_app} -d ${POSTGRES_DB:-goauth}"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:?goauth_app}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:?goauth}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:?}
      - RESEND_API_KEY=${RESEND_API_KEY:?}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@example.com}
      - PORT=${PORT:-8080}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
