services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${{server.POSTGRES_USER}}
      POSTGRES_PASSWORD: ${{server.POSTGRES_PASSWORD}}
      POSTGRES_DB: ${{server.POSTGRES_DB}}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${{server.POSTGRES_USER}}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${{server.POSTGRES_USER}}:${{server.POSTGRES_PASSWORD}}@db:5432/${{server.POSTGRES_DB}}?sslmode=disable
      JWT_SECRET: ${{server.JWT_SECRET}}
      RESEND_API_KEY: ${{server.RESEND_API_KEY}}
      APP_BASE_URL: ${{server.APP_BASE_URL}}
      FROM_EMAIL: ${{server.FROM_EMAIL}}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
