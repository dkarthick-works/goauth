services:
  app:
    build: .
    ports:
      - "${PORT:-8090}:8090"
    environment:
      - DATABASE_URL=${DATABASE_URL:?}
      - JWT_SECRET=${JWT_SECRET:?}
      - RESEND_API_KEY=${RESEND_API_KEY:?}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8090}
      - APP_BASE_URL_FOR_MAILER=${APP_BASE_URL_FOR_MAILER:-http://localhost:8090}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@example.com}
      - PORT=${PORT:-8090}
    networks:
      coolify:
        aliases:
          - goauth
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  coolify:
    external: true
