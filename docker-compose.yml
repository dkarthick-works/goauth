services:
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
      - APP_DB_PASSWORD=${APP_DB_PASSWORD:?}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    ports:
      - "${PORT:-8090}:8090"
    environment:
      - DATABASE_URL=postgres://goauth_app:${APP_DB_PASSWORD:?}@db:5432/goauth?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:?}
      - RESEND_API_KEY=${RESEND_API_KEY:?}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8090}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@example.com}
      - PORT=${PORT:-8090}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8090}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
